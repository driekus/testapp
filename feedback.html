<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#2f7dff" />
    <title>Letter Quest — Results</title>
  </head>
  <body>
    <script type="module" src="/src/mobileGuardEntry.js"></script>
    <div id="mobile-guard" aria-hidden="true"></div>
    <div id="app">
      <main class="container">
        <img id="game-logo" class="game-logo hidden" alt="" />
        <h1 id="feedback-title"></h1>
        <p id="feedback-subtitle" class="hint"></p>

        <!-- Letters collected -->
        <section class="card">
          <h2 id="letters-label"></h2>
          <p id="collected-letters" class="letters"></p>
        </section>

        <!-- Score summary -->
        <section class="card" id="score-summary-card">
          <h2 id="score-summary-title"></h2>
          <p id="score-summary-points"></p>
          <p id="score-summary-time" class="muted"></p>
          <p id="offline-score-notice" class="muted hidden"></p>
        </section>

        <!-- Optional feedback form -->
        <section class="card" id="feedback-form-section">
          <p id="feedback-prompt"></p>
          <label for="feedback-text"></label><textarea id="feedback-text" rows="5"></textarea>
          <p id="feedback-status" class="hidden"></p>
          <div class="actions">
            <button id="submit-feedback-btn"></button>
            <button id="skip-feedback-btn" class="ghost"></button>
          </div>
        </section>

      </main>
    </div>
    <script type="module" src="/src/feedback.js"></script>
  </body>
</html>
