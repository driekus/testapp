<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#2f7dff" />
    <title>Letter Quest — Mobile Only</title>
    <style>
      :root {
        font-family: Inter, system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
        line-height: 1.5;
        color-scheme: light dark;
      }
      * { box-sizing: border-box; margin: 0; padding: 0; }
      body {
        min-height: 100svh;
        display: flex;
        align-items: center;
        justify-content: center;
        background: #f5f7fb;
        color: #1f2937;
        padding: 2rem;
      }
      @media (prefers-color-scheme: dark) {
        body { background: #0f172a; color: #e5e7eb; }
        .card { background: #111827; border-color: #374151; }
      }
      .card {
        max-width: 440px;
        width: 100%;
        background: #fff;
        border: 1px solid #d9e2ef;
        border-radius: 12px;
        padding: 2.5rem 2rem;
        text-align: center;
        box-shadow: 0 4px 24px rgba(0,0,0,.07);
      }
      .emoji { font-size: 3.5rem; margin-bottom: 1rem; display: block; }
      h1 { font-size: 1.5rem; font-weight: 700; margin-bottom: .75rem; }
      p  { color: #4b5563; margin-bottom: .5rem; }
      @media (prefers-color-scheme: dark) { p { color: #9ca3af; } }
      .qr-hint {
        margin-top: 1.5rem;
        font-size: .85rem;
        color: #6b7280;
      }
    </style>
  </head>
  <body>
    <div class="card">
      <span class="emoji">📱</span>
      <h1>Mobile device required</h1>
      <p>Letter Quest is a location-based game designed to be played on a <strong>smartphone</strong>.</p>
      <p>Please open this link on your iPhone or Android phone to play.</p>
      <p class="qr-hint">Tip: scan the QR code you received, or share the link to your phone.</p>
    </div>
  </body>
</html>
