<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Mock Tikkie Payment</title>
    <style>
      body {
        font-family: Inter, system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
        margin: 0;
        background: #f5f7fb;
        color: #1f2937;
      }

      main {
        min-height: 100vh;
        display: grid;
        place-items: center;
        padding: 16px;
      }

      .card {
        width: min(520px, 100%);
        background: #fff;
        border: 1px solid #d9e2ef;
        border-radius: 12px;
        padding: 18px;
        display: grid;
        gap: 10px;
      }

      .muted {
        color: #6b7280;
      }

      button {
        border: 1px solid #2f7dff;
        background: #2f7dff;
        color: #fff;
        border-radius: 8px;
        padding: 10px 14px;
        font-size: 0.95rem;
        cursor: pointer;
      }

      button:disabled {
        opacity: 0.6;
        cursor: not-allowed;
      }
    </style>
  </head>
  <body>
    <main>
      <section class="card">
        <h1>Simulated Tikkie payment</h1>
        <p id="game-line"></p>
        <p id="amount-line"></p>
        <p id="status" class="muted"></p>
        <button id="pay-now" type="button">Pay now</button>
      </section>
    </main>

    <script type="module">
      import { SUPABASE_ANON_KEY, SUPABASE_URL } from '/src/supabaseClient.js'
      import { formatEuro } from '/src/payment.js'

      const params = new URLSearchParams(window.location.search)
      const paymentRequestToken = params.get('t')
      const slug = params.get('slug') || ''
      const amount = Number(params.get('amount') || 0)

      const gameLine = document.querySelector('#game-line')
      const amountLine = document.querySelector('#amount-line')
      const status = document.querySelector('#status')
      const payNow = document.querySelector('#pay-now')

      const readableSlug = slug
        .split('-')
        .filter(Boolean)
        .map((part) => part.charAt(0).toUpperCase() + part.slice(1))
        .join(' ')

      gameLine.textContent = `Game: ${readableSlug || slug || 'Unknown game'}`
      amountLine.textContent = `Amount: ${formatEuro(amount)}`

      if (!paymentRequestToken || !slug) {
        status.textContent = 'Missing token or game slug in the URL.'
        payNow.disabled = true
      }

      payNow.addEventListener('click', async () => {
        payNow.disabled = true
        status.textContent = 'Confirming payment...'

        try {
          const res = await fetch(`${SUPABASE_URL}/functions/v1/tikkie-webhook`, {
            method: 'POST',
            headers: {
              'Content-Type': 'application/json',
              Authorization: `Bearer ${SUPABASE_ANON_KEY}`,
            },
            body: JSON.stringify({ paymentRequestToken }),
          })
          const json = await res.json()
          if (!res.ok) throw new Error(json.error ?? res.statusText)

          window.location.href = `/${encodeURIComponent(slug)}?payment_request_token=${encodeURIComponent(paymentRequestToken)}`
        } catch (err) {
          payNow.disabled = false
          status.textContent = String(err)
        }
      })
    </script>
  </body>
</html>
