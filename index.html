<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#2f7dff" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <link rel="manifest" href="/manifest.webmanifest" />
    <title>Letter Quest</title>
  </head>
  <body>
    <div id="app">

      <!-- Lobby (shown when no game slug in URL) -->
      <main id="lobby" class="container hidden">
        <div class="actions" style="justify-content:flex-end; margin-bottom: 8px;">
          <label for="language-select-lobby">
            <span data-i18n="languageLabel"></span>:
            <select id="language-select-lobby">
              <option value="en">EN</option>
              <option value="nl">NL</option>
            </select>
          </label>
        </div>
        <h1 data-i18n="lobbyTitle"></h1>
        <p class="hint" data-i18n="lobbyHint"></p>
        <section class="card" id="game-list"></section>
      </main>

      <!-- Game UI (shown when a game slug is present) -->
      <main id="game-ui" class="container hidden">
        <div class="actions" style="justify-content:space-between; margin-bottom: 8px;">
          <a id="back-link" class="muted" href="/"></a>
          <a id="rankings-link" class="muted" href="/rankings.html"></a>
        </div>
        <img id="game-logo" class="game-logo hidden" alt="" />
        <h1 id="game-title" data-i18n="title"></h1>
        <p id="paid-badge" class="paid-badge hidden"></p>
        <p class="hint" data-i18n="hint"></p>
        <p id="config-status" class="muted"></p>

        <section id="card-payment" class="card hidden">
          <h2 data-i18n="payToPlay"></h2>
          <p id="payment-message"></p>
          <div class="actions">
            <button id="pay-and-play" type="button" data-i18n="payButton"></button>
          </div>
        </section>

        <section id="card-offline" class="card hidden">
          <h2 data-i18n="offlineTitle"></h2>
          <p id="offline-message" data-i18n="offlineHint"></p>
          <div class="actions">
            <button id="download-offline" type="button" data-i18n="downloadOffline"></button>
          </div>
          <p id="offline-status" class="muted"></p>
        </section>

        <!-- Optional name prompt for free games (shown before location is enabled) -->
        <section id="card-name" class="card hidden">
          <h2 data-i18n="nameTitle"></h2>
          <p data-i18n="nameHint"></p>
          <input id="player-name-input" type="text" autocomplete="name" data-i18n-placeholder="namePlaceholder" />
          <div class="actions">
            <button id="start-with-name" type="button" data-i18n="nameStart"></button>
          </div>
        </section>

        <section id="card-target" class="card">
          <h2 data-i18n="currentTarget"></h2>
          <p id="route-badge" class="route-badge"></p>
          <p id="target-name"></p>
          <img id="location-image" class="location-image hidden" alt="" />
          <p id="location-description" class="location-description hidden"></p>
          <p id="distance" class="distance"></p>
        </section>

        <section id="card-progress" class="card">
          <h2 data-i18n="progress"></h2>
          <p id="progress"></p>
          <p id="letters" class="letters"></p>
          <p id="score-total" class="score-total"></p>
        </section>

        <section id="card-location" class="card">
          <h2 data-i18n="locationTitle"></h2>
          <p data-i18n="locationRequired"></p>
          <div class="actions">
            <button id="enable-location" type="button" data-i18n="enableLocation"></button>
          </div>
        </section>

        <section id="card-question" class="card hidden">
          <h2 data-i18n="questionTitle"></h2>
          <p id="question-text"></p>
          <input id="answer-input" type="text" autocomplete="off" data-i18n-placeholder="answerPlaceholder" />
          <p id="answer-feedback" class="answer-feedback hidden"></p>
          <div class="actions">
            <button id="submit-answer" type="button" data-i18n="submitAnswer"></button>
            <button id="skip-question" type="button" class="ghost" data-i18n="continueWithoutAnswer"></button>
          </div>
        </section>

        <section id="card-status" class="card">
          <h2 data-i18n="status"></h2>
          <p id="status"></p>
          <p id="pending-letter" class="pending"></p>
          <div class="actions">
            <button id="confirm-letter" type="button" disabled data-i18n="confirmAndNext"></button>
            <button id="next-route" type="button" class="hidden" data-i18n="startNextRoute"></button>
          </div>
        </section>
        <p id="score-toast" class="score-toast hidden" aria-live="polite"></p>
      </main>

    </div>
    <script type="module" src="/src/main.js"></script>
  </body>
</html>
